{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <h3 class="section-heading mb-3">Technician Dashboard</h3>
  <div class="card hoverable">
    <div class="card-body">
      <p class="subtext">Start sharing your live location. Make sure tracking is enabled by admin or by you.</p>
      <div class="d-flex gap-2">
        <button id="start" class="btn btn-brand">Start Sharing</button>
        <button id="stop" class="btn btn-outline-brand">Stop</button>
      </div>
      <div id="status" class="small text-muted mt-2"></div>
    </div>
  </div>
</div>
<script>
  let ws, timer;
  function connect(){
    ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws/tech-location/');
  }
  function sendLocation(){
    if(!ws || ws.readyState!==1) return;
    if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos=>{
      const {latitude, longitude} = pos.coords;
      ws.send(JSON.stringify({type:'update', lat: latitude, lng: longitude}));
      document.getElementById('status').textContent = `Sent: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
    });
  }
  document.getElementById('start').onclick = ()=>{
    connect();
    clearInterval(timer);
    timer = setInterval(sendLocation, 5000);
  };
  document.getElementById('stop').onclick = ()=>{ clearInterval(timer); if(ws) ws.close(); };
</script>
{% endblock %}
