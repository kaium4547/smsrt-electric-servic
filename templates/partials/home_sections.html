<section class="py-4">
  <h3 class="mb-3">আমাদের প্রধান সার্ভিস</h3>
  <div class="row">
    {% for title, icon in (
      ('ইলেকট্রিক কাজ', '⚡'),
      ('সোলার ইনস্টলেশন', '☀️'),
      ('সিসিটিভি ক্যামেরা', '📷'),
      ('এসি সার্ভিস', '❄️'),
      ('ফ্রিজ সার্ভিসিং', '🧊'),
      ('আইপিএস সার্ভিস', '🔋'),
    ) %}
    <div class="col-md-4 mb-3">
      <div class="card h-100">
        <div class="card-body">
          <div class="h4">{{ icon }} {{ title }}</div>
          <p class="text-muted mb-0">নির্ভরযোগ্য ও মানসম্মত সেবা।</p>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</section>
