{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 480px; margin-top: 3rem;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h4 class="mb-3">লগইন</h4>
      <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next|urlencode }}{% endif %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">ইমেইল/ইউজারনেম</label>
          <input type="text" class="form-control" name="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">পাসওয়ার্ড</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">লগইন</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
