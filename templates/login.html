{% extends 'base.html' %}
{% block content %}
<section class="auth-form-section">
  <div class="container">
    <div class="auth-form">
      <h2 class="text-center" style="margin-bottom:18px;">লগইন করুন</h2>
      <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next|urlencode }}{% endif %}">
        {% csrf_token %}
        <div class="form-group">
          <label>ইমেইল/ইউজারনেম</label>
          <input type="text" name="username" placeholder="আপনার ইমেইল/ইউজারনেম" required>
        </div>
        <div class="form-group">
          <label>পাসওয়ার্ড</label>
          <input type="password" name="password" placeholder="পাসওয়ার্ড" required>
        </div>
        <button type="submit" class="btn">লগইন করুন</button>
        <p class="form-switch-link">অ্যাকাউন্ট নেই? <a href="{% url 'users:signup' %}">সাইনআপ করুন</a></p>
      </form>
    </div>
  </div>
</section>
{% endblock %}
