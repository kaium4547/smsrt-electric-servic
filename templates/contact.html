{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width: 920px; margin-top: 2rem;">
  <div class="card shadow-sm">
    <div class="row g-0">
      <div class="col-md-6 p-4">
        <h3 class="mb-3">যোগাযোগ</h3>
        <p class="text-muted">আপনার যেকোনো সার্ভিস/সহায়তার জন্য যোগাযোগ করুন</p>
        <div class="mb-3">
          <div class="d-flex align-items-center mb-2">
            <span class="me-2">📍</span>
            <div>
              <div class="fw-semibold">ঠিকানা</div>
              <div id="contact-address">Dhaka, Bangladesh</div>
            </div>
          </div>
          <div class="d-flex align-items-center mb-2">
            <span class="me-2">📞</span>
            <div>
              <div class="fw-semibold">ফোন</div>
              <a href="tel:+8801700000000">+8801700000000</a>
            </div>
          </div>
          <div class="d-flex align-items-center mb-2">
            <span class="me-2">✉️</span>
            <div>
              <div class="fw-semibold">ইমেইল</div>
              <a href="mailto:info@smartelectric.example">info@smartelectric.example</a>
            </div>
          </div>
        </div>
        <div class="d-flex gap-2 mt-3">
          <a class="btn btn-success" target="_blank" id="whatsapp-btn" href="https://wa.me/8801700000000?text={{ request.build_absolute_uri|urlencode }}">WhatsApp</a>
          <a class="btn btn-outline-primary" target="_blank" id="directions-btn" href="https://www.google.com/maps/dir/?api=1&destination=Dhaka%2C%20Bangladesh">Get Directions</a>
        </div>
        <hr class="my-4"/>
        <form id="location-form">
          <div class="mb-2">আপনার লোকেশন শেয়ার করুন (টেকনিশিয়ান ট্র্যাকিং এর জন্য):</div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="button" id="share-location">Share Location</button>
            <span id="loc-status" class="text-muted"></span>
          </div>
        </form>
      </div>
      <div class="col-md-6">
        <div id="map" style="height: 100%; min-height: 420px; border-radius: 0 0 8px 0;"></div>
      </div>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
  const map = L.map('map').setView([23.8103, 90.4125], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  let marker = L.marker([23.8103, 90.4125]).addTo(map);

  document.getElementById('share-location').addEventListener('click', () => {
    const status = document.getElementById('loc-status');
    if (!navigator.geolocation) {
      status.textContent = 'Geolocation not supported';
      return;
    }
    status.textContent = 'Locating...';
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude, longitude } = pos.coords;
      status.textContent = `Lat: ${latitude.toFixed(6)}, Lng: ${longitude.toFixed(6)}`;
      marker.setLatLng([latitude, longitude]);
      map.setView([latitude, longitude], 14);
    }, err => {
      status.textContent = 'Location permission denied';
    });
  });
</script>
{% endblock %}
