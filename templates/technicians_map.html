{% extends 'base.html' %}
{% block content %}
<div class="container" style="margin-top: 1rem;">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h5 class="mb-0">লাইভ লোকেশন ম্যাপ</h5>
    <div class="d-flex gap-2">
      <button id="my-location" class="btn btn-outline-primary btn-sm">আমার লোকেশন দেখাও</button>
      <a class="btn btn-outline-secondary btn-sm" href="{% url 'users:live_map' %}">রিয়েলটাইম ভিউ</a>
    </div>
  </div>
</div>
<div id="map" style="height: 480px; border-radius: 12px; border: 1px solid #e5e7eb;"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
  const technicians = {{ technicians|safe|default:'[]' }};
  let map = L.map('map');
  if (technicians.length) {
    const first = technicians[0];
    map.setView([first.lat, first.lng], 12);
  } else {
    map.setView([23.8103, 90.4125], 11);
  }
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map);

  // Technician markers
  const techLayer = L.layerGroup().addTo(map);
  technicians.forEach(t => {
    if (t.lat && t.lng) {
      const m = L.marker([t.lat, t.lng]).bindPopup(`<b>${t.name}</b><br/><small>${t.updated_at || ''}</small>`);
      techLayer.addLayer(m);
    }
  });

  // User location
  let myMarker = null;
  document.getElementById('my-location').addEventListener('click', () => {
    if (!navigator.geolocation) return alert('Geolocation not supported');
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude, longitude } = pos.coords;
      if (!myMarker) { myMarker = L.marker([latitude, longitude], { title: 'Me' }).addTo(map); }
      else { myMarker.setLatLng([latitude, longitude]); }
      map.setView([latitude, longitude], 14);
    }, err => alert('Location permission denied'));
  });
</script>
{% endblock %}
