{% load static %}
<!DOCTYPE html>
<html lang="bn">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>আমাদের প্রোডাক্টস</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		@font-face{font-family:'Noto Sans Bengali';font-style:normal;font-weight:400;src:local('Noto Sans Bengali');}
		body{font-family:'Noto Sans Bengali', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', Arial, 'Apple Color Emoji', 'Segoe UI Emoji';}
	</style>
</head>
<body class="bg-[#111] text-white">
	<section class="max-w-7xl mx-auto px-4 py-10">
		<div class="text-center">
			<h1 class="text-4xl md:text-5xl font-extrabold text-orange-500">আমাদের প্রোডাক্টস</h1>
			<p class="mt-2 text-gray-300">উচ্চ মানের ইলেকট্রনিক ও গৃহস্থালী সরঞ্জাম</p>
			<div class="w-28 h-1.5 bg-gradient-to-r from-orange-400 to-blue-400 rounded-full mx-auto mt-3"></div>
		</div>

		<!-- Category chips -->
		<div class="flex flex-wrap items-center justify-center gap-3 mt-6">
			{% for c in categories %}
				<button class="px-4 py-2 rounded-full border border-orange-500 text-orange-300 hover:bg-orange-500 hover:text-black transition">{{ c }}</button>
			{% endfor %}
		</div>

		<!-- Products grid -->
		<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mt-8">
			{% for p in products %}
				<div class="group rounded-2xl border border-orange-500/90 bg-[#151515] overflow-hidden shadow-[0_10px_30px_rgba(255,138,0,0.08)] hover:shadow-[0_16px_40px_rgba(255,138,0,0.16)] transition">
					<div class="h-28 flex items-center justify-center bg-[#0f0f0f]">
						<img src="{{ p.img }}" alt="{{ p.title }}" class="h-20 object-contain" />
					</div>
					<div class="px-4 pt-4 pb-5">
						<h3 class="text-lg font-extrabold text-orange-400">{{ p.title }}</h3>
						<p class="mt-1 text-sm text-gray-300">{{ p.desc }}</p>
						<div class="mt-3 flex items-center gap-2">
							<span class="text-green-400 font-bold">৳ {{ p.price }}</span>
							<span class="text-gray-400 line-through">৳ {{ p.old_price }}</span>
						</div>
						<div class="mt-4 flex justify-center">
							<button class="px-5 py-2 rounded-full bg-orange-500 text-black font-bold hover:brightness-95 hover:text-white transition shadow-[0_8px_18px_rgba(255,138,0,0.25)]">
								কার্টে যোগ করুন
							</button>
						</div>
					</div>
				</div>
			{% endfor %}
		</div>
	</section>
</body>
</html>
