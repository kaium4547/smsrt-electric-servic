{% extends 'base.html' %}
{% block content %}
<div class="container" style="margin-top: 2rem;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>আমার অর্ডারসমূহ</h4>
    <a class="btn btn-primary" href="{% url 'orders:order_create' %}">নতুন অর্ডার</a>
  </div>
  <div class="list-group">
    {% for o in orders %}
      <a href="{% url 'orders:order_detail' o.id %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
        <span>Order #{{ o.id }} — {{ o.status }}</span>
        <span class="d-flex gap-2">
          {% if o.snapshot_latitude and o.snapshot_longitude %}
          <a class="btn btn-sm btn-outline-primary" target="_blank" href="https://www.google.com/maps?q={{ o.snapshot_latitude }},{{ o.snapshot_longitude }}">Map</a>
          {% endif %}
          <span class="badge bg-secondary">{{ o.created|date:"Y-m-d H:i" }}</span>
        </span>
      </a>
    {% empty %}
      <div class="text-muted">কোনো অর্ডার নেই।</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
